<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#000000"/>

  <!-- Subtle gradient orb -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Package name -->
  <text x="640" y="200" text-anchor="middle" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-3">
    model-cost
  </text>

  <!-- Tagline -->
  <text x="640" y="248" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="18" fill="#888888" letter-spacing="0.5">
    Compare LLM API pricing from your terminal. 300+ models.
  </text>

  <!-- Terminal card -->
  <rect x="270" y="288" width="740" height="194" rx="8" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Terminal dots -->
  <circle cx="294" cy="308" r="5" fill="#333333"/>
  <circle cx="312" cy="308" r="5" fill="#333333"/>
  <circle cx="330" cy="308" r="5" fill="#333333"/>

  <!-- Command line -->
  <text x="294" y="346" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#555555">$</text>
  <text x="312" y="346" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#999999">npx model-cost compare claude-sonnet-4-6 gpt-4o deepseek-chat</text>

  <!-- Header row -->
  <text x="294" y="378" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#555555">                     claude-sonnet-4-6   gpt-4o              deepseek-chat</text>

  <!-- Input row -->
  <text x="294" y="404" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#555555">  Input / 1M</text>
  <text x="472" y="404" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#22c55e">$3.00</text>
  <text x="632" y="404" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#22c55e">$2.50</text>
  <text x="792" y="404" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#22c55e">$0.14</text>

  <!-- Output row -->
  <text x="294" y="430" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#555555">  Output / 1M</text>
  <text x="472" y="430" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#eab308">$15.00</text>
  <text x="632" y="430" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#eab308">$10.00</text>
  <text x="792" y="430" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#eab308">$0.28</text>

  <!-- Context row -->
  <text x="294" y="456" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#555555">  Max Input</text>
  <text x="472" y="456" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#666666">200K</text>
  <text x="632" y="456" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#666666">128K</text>
  <text x="792" y="456" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#666666">64K</text>

  <!-- Install hint -->
  <text x="640" y="540" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#333333">
    npx model-cost &lt;search&gt;
  </text>

  <!-- Footer -->
  <text x="640" y="600" text-anchor="middle" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="12" fill="#444444" letter-spacing="0.5">
    saqibameen.com  ·  x.com/saqibameen
  </text>
</svg>