  <text x="580" y="280" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#ccc">openai</text>
  <text x="780" y="280" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#ccc">deepseek</text>

  <text x="180" y="310" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#555">  Input / 1M</text>
  <text x="380" y="310" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#4ade80">$3.00</text>
  <text x="580" y="310" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#4ade80">$2.50</text>
  <text x="780" y="310" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#4ade80">$0.28</text>

  <text x="180" y="340" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#555">  Output / 1M</text>
  <text x="380" y="340" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#facc15">$15.00</text>
  <text x="580" y="340" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#facc15">$10.00</text>
  <text x="780" y="340" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#facc15">$0.42</text>

