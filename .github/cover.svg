  <text x="580" y="370" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#888">128K</text>
  <text x="780" y="370" font-family="ui-monospace, 'SF Mono', Monaco, monospace" font-size="14" fill="#888">131K</text>

